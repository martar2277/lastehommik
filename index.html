<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3e7cb1">
  <title>Hommikuprogramm Lasteaiale</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top-bar">
    <h1>Hommikuprogramm</h1>
    <p>Lihtsad ja lõbusad liikumismängud igaks päevaks</p>
  </header>

  <main>
    <section class="day-selector" aria-label="Vali nädalapäev">
      <button class="day-btn" data-day="esmaspaev">E</button>
      <button class="day-btn" data-day="teisipaev">T</button>
      <button class="day-btn" data-day="kolmapaev">K</button>
      <button class="day-btn" data-day="neljapaev">N</button>
      <button class="day-btn" data-day="reede">R</button>
    </section>

    <section class="program" aria-live="polite">
      <div class="program-header">
        <h2 id="day-title">Esmaspäev</h2>
        <span id="total-time" class="tag">10-15 min</span>
      </div>

      <article class="block">
        <header>
          <h3>Soojendus</h3>
          <span class="tag" id="warmup-time">3 min</span>
        </header>
        <ul id="warmup-list" class="activity-list"></ul>
      </article>

      <article class="block">
        <header>
          <h3>Põhiosa</h3>
          <span class="tag" id="main-time">5-8 min</span>
        </header>
        <ul id="main-list" class="activity-list"></ul>
      </article>

      <article class="block">
        <header>
          <h3>Lõdvestus</h3>
          <span class="tag" id="cooldown-time">2-4 min</span>
        </header>
        <ul id="cooldown-list" class="activity-list"></ul>
      </article>
    </section>

    <section class="notes">
      <h3>Õpetaja märkmed</h3>
      <textarea id="notes" placeholder="Kirjuta tähelepanekud või kohandused"></textarea>
    </section>

    <section class="quick-actions">
      <button id="reset-day" class="secondary">Alusta uuesti</button>
      <button id="shuffle" class="secondary">Vaheta järjekorda</button>
    </section>
  </main>

  <footer>
    <p>Vihje: Sea meeldetuletus iga hommik</p>
  </footer>

  <template id="activity-template">
    <li class="activity-item">
      <label>
        <input type="checkbox" class="activity-check">
        <span class="activity-title"></span>
      </label>
      <p class="activity-description"></p>
    </li>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
